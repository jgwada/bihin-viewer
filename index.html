<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シンフォニックスターマイン備品管理</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --orange: #fb923c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-content {
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-link {
      padding: 0.4rem 1rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600;
      background: var(--surface2); color: var(--text-muted); text-decoration: none;
      border: 1px solid var(--border); transition: all 0.2s;
    }
    .nav-link:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .header-meta {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .controls {
      max-width: 1600px;
      margin: 1.5rem auto;
      padding: 0 2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-box {
      flex: 1; min-width: 200px; max-width: 400px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 0.6rem 1rem 0.6rem 2.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box::before {
      content: "\1F50D";
      position: absolute; left: 0.8rem; top: 50%;
      transform: translateY(-50%); font-size: 0.9rem;
    }
    .view-toggle {
      display: flex;
      background: var(--surface);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .view-toggle button {
      padding: 0.6rem 1.2rem;
      background: none; border: none;
      color: var(--text-muted);
      cursor: pointer; font-size: 0.85rem;
      transition: all 0.2s;
    }
    .view-toggle button.active {
      background: var(--accent);
      color: #0f172a;
      font-weight: 600;
    }
    .filter-chips { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .chip {
      padding: 0.4rem 0.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:hover, .chip.active {
      background: var(--accent);
      color: #0f172a;
      border-color: var(--accent);
    }
    .main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 2rem 3rem;
    }
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem;
      transition: transform 0.2s;
    }
    .summary-card:hover { transform: translateY(-2px); }
    .summary-card .label {
      font-size: 0.75rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem;
    }
    .summary-card .value { font-size: 1.8rem; font-weight: 700; }
    .summary-card .sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem; }
    .summary-card.danger .value { color: var(--red); }
    .summary-card.ok .value { color: var(--green); }
    .summary-card.info .value { color: var(--accent); }
    /* Table */
    .table-container {
      overflow: auto;
      max-height: calc(100vh - 200px);
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead th {
      background: var(--surface2);
      padding: 0.8rem 0.6rem;
      text-align: center;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 2px solid var(--border);
      position: sticky; top: 0; z-index: 3;
      white-space: nowrap;
      font-size: 0.75rem;
    }
    tbody tr {
      border-bottom: 1px solid rgba(71,85,105,0.3);
      transition: background 0.15s;
    }
    tbody tr:hover { background: rgba(56,189,248,0.05); }
    td { padding: 0.5rem 0.6rem; text-align: center; white-space: nowrap; }
    td.loc-name {
      font-weight: 600; color: var(--accent);
      position: sticky; left: 0;
      background: var(--surface);
      z-index: 1; text-align: left;
      min-width: 140px;
      max-width: 200px;
      white-space: normal;
      word-break: break-all;
    }
    tbody tr:hover td.loc-name { background: #1a2d44; }
    .qty { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 600; min-width: 2rem; }
    .q-neg { background: rgba(248,113,113,0.2); color: var(--red); font-weight: 700; }
    .q-low { background: rgba(248,113,113,0.15); color: var(--red); }
    .q-mid { background: rgba(251,191,36,0.15); color: var(--yellow); }
    .q-hi  { background: rgba(74,222,128,0.15); color: var(--green); }
    .q-zero { color: var(--text-muted); }
    /* Cards */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 1.2rem;
    }
    .loc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .loc-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
    .loc-card-head {
      padding: 1rem 1.2rem;
      background: linear-gradient(135deg, var(--surface2), var(--surface));
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .loc-card-head h3 { font-size: 1rem; color: var(--accent); }
    .loc-card-head .cnt {
      font-size: 0.75rem;
      background: rgba(56,189,248,0.15);
      color: var(--accent);
      padding: 0.2rem 0.6rem;
      border-radius: 10px;
    }
    .loc-card-body { padding: 1rem 1.2rem; }
    .item-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(71,85,105,0.2);
    }
    .item-row:last-child { border-bottom: none; }
    .item-name { font-size: 0.85rem; }
    .item-qty { font-size: 0.85rem; font-weight: 600; }
    /* Reserve */
    .reserve-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.8rem;
    }
    .reserve-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .reserve-item.neg { border-left: 3px solid var(--red); }
    .reserve-item.pos { border-left: 3px solid var(--green); }
    .reserve-item .rname { font-size: 0.85rem; }
    .reserve-item .rsub { font-size: 0.75rem; color: var(--text-muted); }
    .reserve-item .rqty { font-weight: 700; font-size: 0.95rem; }
    .section-title {
      font-size: 1.1rem; font-weight: 700;
      margin: 1.5rem 0 1rem;
    }
    .refresh-btn {
      padding: 0.6rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer; font-size: 0.85rem;
      transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .footer {
      text-align: center; padding: 2rem;
      color: var(--text-muted); font-size: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .footer a { color: var(--accent); text-decoration: none; }
    @media (max-width: 768px) {
      .header { padding: 1rem; }
      .controls { padding: 0 1rem; }
      .main { padding: 0 1rem 2rem; }
      .card-grid { grid-template-columns: 1fr; }
      .summary-cards { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

// --- Utility ---
function displayName(name) {
  return name.replace(/&#10;/g, '<br>');
}

function displayNamePlain(name) {
  return name.replace(/&#10;/g, ' ');
}

// --- State ---
let allData = DATA;
let currentView = 'table';
let searchTerm = '';
let activeCategory = null;

document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  render();
});

function switchView(v) {
  currentView = v;
  document.querySelectorAll('.view-toggle button').forEach(b =>
    b.classList.toggle('active', b.dataset.view === v)
  );
  render();
}

function setCategory(cat) {
  activeCategory = cat;
  render();
}

function qc(v) {
  if (v < 0) return 'q-neg';
  if (v === 0) return 'q-zero';
  if (v <= 3) return 'q-low';
  if (v <= 10) return 'q-mid';
  return 'q-hi';
}

function filteredItems() {
  let its = allData.items;
  if (activeCategory) its = its.filter(i => i.category === activeCategory);
  if (searchTerm) its = its.filter(i => i.name.toLowerCase().includes(searchTerm) || i.category.toLowerCase().includes(searchTerm));
  return its;
}

function filteredLocations() {
  const its = filteredItems();
  const names = new Set(its.map(i => i.name));
  let locs = allData.locations;
  if (searchTerm) {
    locs = locs.filter(l =>
      l.name.toLowerCase().includes(searchTerm) ||
      Object.keys(l.quantities).some(q => q.toLowerCase().includes(searchTerm))
    );
  }
  return { locs, its, names };
}

function render() {
  if (!allData) return;
  renderSummary();
  renderChips();
  if (currentView === 'table') renderTable();
  else if (currentView === 'cards') renderCards();
  else renderReserve();
}

function renderSummary() {
  const { items, locations } = allData;
  const neg = items.filter(i => i.reserve < 0).length;
  document.getElementById('summaryCards').innerHTML = `
    <div class="summary-card info"><div class="label">備品アイテム数</div><div class="value">${items.length}</div><div class="sub">全カテゴリ合計</div></div>
    <div class="summary-card ok"><div class="label">配置場所</div><div class="value">${locations.length}</div><div class="sub">箇所</div></div>
    <div class="summary-card ${neg > 0 ? 'danger' : 'ok'}"><div class="label">不足アイテム</div><div class="value">${neg}</div><div class="sub">${neg > 0 ? '予備がマイナス' : '問題なし'}</div></div>
    <div class="summary-card info"><div class="label">カテゴリ数</div><div class="value">${new Set(items.map(i => i.category)).size}</div><div class="sub">グループ</div></div>
  `;
}

function renderChips() {
  const cats = [...new Set(allData.items.map(i => i.category))];
  document.getElementById('filterChips').innerHTML =
    `<span class="chip ${!activeCategory ? 'active' : ''}" onclick="setCategory(null)">すべて</span>` +
    cats.map(c => `<span class="chip ${activeCategory === c ? 'active' : ''}" onclick="setCategory('${c.replace(/'/g, "\\'")}')">${c}</span>`).join('');
}

function renderTable() {
  const { locs, its } = filteredLocations();
  let h = `<div class="table-container"><table><thead><tr><th style="position:sticky;left:0;top:0;z-index:4;background:var(--surface2);text-align:left">場所</th>`;
  for (const i of its) {
    h += `<th title="${i.category}">${i.name}${i.unit ? '<br><small style="color:var(--text-muted);font-weight:400">' + i.unit + '</small>' : ''}</th>`;
  }
  h += `</tr></thead><tbody>`;
  for (const loc of locs) {
    h += `<tr><td class="loc-name">${displayName(loc.name)}</td>`;
    for (const i of its) {
      const v = loc.quantities[i.name] || 0;
      h += v === 0
        ? `<td><span class="q-zero">-</span></td>`
        : `<td><span class="qty ${qc(v)}">${v}</span></td>`;
    }
    h += `</tr>`;
  }
  // Reserve row
  h += `<tr style="border-top:2px solid var(--border);background:rgba(251,191,36,0.05)"><td class="loc-name" style="color:var(--yellow)">予備</td>`;
  for (const i of its) {
    const r = i.reserve;
    h += `<td><span class="qty ${r < 0 ? 'q-neg' : r > 0 ? 'q-hi' : 'q-zero'}">${r || '-'}</span></td>`;
  }
  h += `</tr>`;
  // Stock row
  h += `<tr style="background:rgba(56,189,248,0.05)"><td class="loc-name" style="color:var(--accent)">在庫</td>`;
  for (const i of its) {
    h += `<td><span class="qty ${i.stock > 0 ? 'q-hi' : 'q-zero'}">${i.stock || '-'}</span></td>`;
  }
  h += `</tr>`;
  // Total needed row
  h += `<tr style="border-top:2px solid var(--accent);background:rgba(56,189,248,0.08)"><td class="loc-name" style="color:var(--accent);font-size:0.9rem">必要数 合計</td>`;
  for (const i of its) {
    let total = 0;
    for (const loc of allData.locations) {
      total += loc.quantities[i.name] || 0;
    }
    h += `<td><span class="qty" style="font-weight:700;color:var(--accent)">${total || '-'}</span></td>`;
  }
  h += `</tr></tbody></table></div>`;
  document.getElementById('content').innerHTML = h;
}

function renderCards() {
  const { locs, its, names } = filteredLocations();
  let h = '<div class="card-grid">';
  for (const loc of locs) {
    const entries = Object.entries(loc.quantities).filter(([n]) => names.has(n)).sort((a, b) => b[1] - a[1]);
    if (entries.length === 0) continue;
    const unitOf = n => { const f = allData.items.find(i => i.name === n); return f ? f.unit : ''; };
    h += `<div class="loc-card"><div class="loc-card-head"><h3>${displayNamePlain(loc.name)}</h3><span class="cnt">${entries.length} アイテム</span></div><div class="loc-card-body">`;
    for (const [n, v] of entries) {
      h += `<div class="item-row"><span class="item-name">${n}</span><span class="item-qty ${qc(v)}">${v} ${unitOf(n)}</span></div>`;
    }
    h += `</div></div>`;
  }
  h += '</div>';
  document.getElementById('content').innerHTML = h;
}

function renderReserve() {
  const its = filteredItems();
  const neg = its.filter(i => i.reserve < 0).sort((a, b) => a.reserve - b.reserve);
  const pos = its.filter(i => i.reserve > 0).sort((a, b) => b.reserve - a.reserve);
  const zero = its.filter(i => i.reserve === 0);

  let h = '';
  if (neg.length) {
    h += `<div class="section-title" style="color:var(--red)">不足アイテム (${neg.length}件)</div><div class="reserve-grid">`;
    for (const i of neg) h += `<div class="reserve-item neg"><div><div class="rname">${i.name}</div><div class="rsub">${i.category} / 在庫: ${i.stock}${i.unit}</div></div><div class="rqty" style="color:var(--red)">${i.reserve} ${i.unit}</div></div>`;
    h += `</div>`;
  }
  if (pos.length) {
    h += `<div class="section-title" style="color:var(--green)">余裕あり (${pos.length}件)</div><div class="reserve-grid">`;
    for (const i of pos) h += `<div class="reserve-item pos"><div><div class="rname">${i.name}</div><div class="rsub">${i.category} / 在庫: ${i.stock}${i.unit}</div></div><div class="rqty" style="color:var(--green)">+${i.reserve} ${i.unit}</div></div>`;
    h += `</div>`;
  }
  if (zero.length) {
    h += `<div class="section-title" style="color:var(--text-muted)">予備なし (${zero.length}件)</div><div class="reserve-grid">`;
    for (const i of zero) h += `<div class="reserve-item"><div><div class="rname">${i.name}</div><div class="rsub">${i.category} / 在庫: ${i.stock}${i.unit}</div></div><div class="rqty" style="color:var(--text-muted)">0</div></div>`;
    h += `</div>`;
  }
  document.getElementById('content').innerHTML = h;
}

// Initialize
document.getElementById('lastUpdate').textContent = `埋め込みデータ`;
render();
</script>
